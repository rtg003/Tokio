# H12 — seleção quase pura por simulação: só gates de sanidade (anti-aporte,
# anti-concentração, amostra mínima) e ranking 100% pelo net simulado em A.
entry_rule:
  min_positive_windows: 0
  required_windows: []
hard_filters:
  f1_recent_activity_days: 21
  f2_min_closed_trades: 15
  f2b_min_trades_30d: 3
  f5_max_drawdown_90d_pct: 100.0   # efetivamente OFF (100% = liquidação total)
score_adjustments:
  min_score_for_suggestion: 0.0
lab:
  rank_by: stage4_net
  min_stage4_net: 10.0
  max_equity_usd: 150000
  min_positive_weeks: 2
