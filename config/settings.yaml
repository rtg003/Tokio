# Tokio - global settings (non-secret). Secrets live in .env only.

exchange:
  active: hyperliquid
  network: testnet          # testnet | mainnet — mainnet switch is a HUMAN gate

risk:
  # Global caps enforced by the gateway's risk_enforcer — out of reach of runners.
  max_order_notional_usd: 3000.0        # max value per single order
  max_total_exposure_usd: 4000.0       # max aggregate open exposure
  max_strategy_exposure_usd: 4000.0     # default per-strategy cap (overridable per strategy)
  max_daily_loss_usd: 100.0            # circuit breaker: pauses ALL strategies
  max_leverage_global: 5.0             # leverage always truncated by this ceiling
  min_order_notional_usd: 10.0         # Hyperliquid minimum

execution:
  # Ordens market (IOC agressivo). Tenta cada slippage em ordem antes de desistir
  # — 1% fixo do SDK não cruza o book de ativos voláteis (ex.: HYPE).
  market_slippage_steps: [0.05, 0.10, 0.15, 0.30]

rate_limit:
  # Per-strategy request budget managed by the gateway (address budget is finite:
  # 1 request per 1 USDC of cumulative volume + 10k initial buffer).
  default_strategy_budget_per_min: 30
  reserve_for_cancels: 0.2             # fraction of budget always reserved for cancels

wip_limits:
  # Each runner is a process and the rate-limit budget is finite.
  max_active_strategies: 6
  max_dry_run_strategies: 10

fees:
  # Hyperliquid base tier — every metric is NET of these.
  taker_pct: 0.045
  maker_pct: 0.015

notifications:
  channel: telegram

paths:
  data_dir: data
  logs_dir: logs
  kill_file: KILL

gateway:
  host: "0.0.0.0"
  port: 8700

copy_trade:
  # Endereços-alvo descobertos vivem na mainnet pública da Hyperliquid.
  # A rede de execução (TESTNET/MAINNET) é decidida por trader no status.
  watch_network: mainnet
  # Intervalo do reconcile corretivo. Mín. 60s e < cooldown por símbolo (120s)
  # para não empilhar ordens antes do fill refletir no ledger (UPDATE-0023).
  reconcile_interval_s: 60
  # Auto-transfer spot→perp POR CONTA (wallet+ambiente). Na HL spot e perp são
  # pools de margem SEPARADOS; USDC no spot não cobre ordem perp sem
  # usd_class_transfer. Quando ligado, o executor garante margem perp antes de
  # abrir posição, transferindo do spot livre da PRÓPRIA conta (nunca cruza
  # wallets/ambientes). testnet liga por padrão; mainnet exige opt-in explícito.
  auto_transfer_margin: true
  auto_transfer_margin_mainnet: false   # gate extra p/ mainnet (default OFF)
  margin_transfer_buffer_pct: 5.0       # folga sobre o necessário (fees/slippage)
  min_transfer_usd: 1.0                  # HL não aceita transfer < $1
  # Auto-resume de strategies auto-pausadas: após N horas SEM novo breach, volta
  # para active automaticamente (evento strategy.auto_resumed). null = manual.
  auto_resume_after_hours: null
