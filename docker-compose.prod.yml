# Production overlay: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds `web` (Next.js) and `proxy` (Caddy, automatic TLS) serving tokio.bz.
# ONLY the proxy publishes ports (80/443). Gateway and runners
# stay on the internal network — nothing from the engine reaches the host.
#
# BEFORE first deploy (ADR 0006): inspect ports 80/443 on the VPS
# (`ss -tlnp`). If a reverse proxy already serves Luthor/Hermes, do NOT start
# this proxy — add the tokio.bz vhost to the existing one instead.

services:
  web:
    build:
      context: ./web
    container_name: tokio-web
    restart: unless-stopped
    networks: [internal]
    environment:
      GATEWAY_HOST: gateway
      GATEWAY_PORT: "8700"
      GATEWAY_CONTROL_TOKEN: ${GATEWAY_CONTROL_TOKEN}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      DASHBOARD_AUTH_SECRET: ${DASHBOARD_AUTH_SECRET}
    depends_on: [gateway]
    deploy:
      resources:
        limits: {cpus: "0.5", memory: 512M}

  proxy:
    image: caddy:2-alpine
    container_name: tokio-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks: [internal]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [web]
    deploy:
      resources:
        limits: {cpus: "0.3", memory: 256M}

volumes:
  caddy-data:
  caddy-config:
